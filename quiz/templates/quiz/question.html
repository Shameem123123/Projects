<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            width: 600px;
        }

        .question-box{
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        h2{
            color: #555;
            margin-bottom: 10px;
        }

        h3{
            margin-bottom: 25px;
        }

        .option{
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option:hover{
            background-color: #f0f4ff;
        }

        .button-group{
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 25px;
        }

        .submit-btn{
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        .submit-btn:disabled{
            background-color: #9ca3af;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .next-btn{
            background-color: transparent;
            color: #777;
            border: 1px solid #ccc;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .next-btn:hover{
            background-color: #f3f3f3;
        }

        input[type="radio"]{
            margin-right: 10px;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="question-box">

        <h2>Question {{ index }} of {{ total }}</h2>

        <h3>{{ question.question_text }}</h3>

        <form method="POST">

            {% csrf_token %}

            {% for choice in question.choice_set.all %}

                <label class="option">

                    <input type="radio"
                           name="choice"
                           value="{{ choice.id }}"
                           onclick="enableSubmit()">

                    {{ choice.choice_text }}

                </label>

            {% endfor %}

            <div class="button-group">

                <button type="submit"
                        class="next-btn">
                    Skip
                </button>

                <button type="submit"
                        id="submitBtn"
                        class="submit-btn"
                        disabled>
                    Submit Answer
                </button>

            </div>

        </form>

    </div>

</div>

<script>

    function enableSubmit(){

        document.getElementById('submitBtn').disabled = false;
    }

</script>

</body>
</html>
